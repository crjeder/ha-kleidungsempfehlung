# Beispiel-Konfiguration für Kleidungsempfehlung Integration
# Diese Einträge kommen in die configuration.yaml von Home Assistant

kleidungsempfehlung:
  # Name des Sensors (optional)
  name: "Kleidungsempfehlung"

  # Inventar einbinden (Pfad relativ zu config-Ordner)
  inventory: !include inventory.yaml

  # Engine-Konfiguration (optional)
  max_layers: 4                    # Maximale Schichten pro Körperzone
  solver: "ilp"                    # "ilp" (optimal) oder "heuristic" (schnell)
  layering_factor: 0.835           # Effizienzfaktor für überlappende Schichten

  # Basis-Outfit (optional) - Items die immer getragen werden
  base_ensemble:
    - slot: legs
      layer: 0
      item_id: boxer_synthetic
      locked: false
    - slot: feet
      layer: 0
      item_id: socks_standard
      locked: false
    - slot: feet
      layer: 3
      item_id: sneakers
      locked: false

  # Option A: Wetter-Entity (empfohlen) – nutzt Stundenprognose für Minimal-Gefühlstemperatur
  # Gibt weather_entity an, werden Temperatur und Wind aus der Prognose bezogen.
  # sensor_temperature_high und sensor_wind in 'weather' werden dann ignoriert.
  weather_entity: weather.home                       # z.B. Met.no, OpenWeatherMap, …

  # Option B: Einzelne Wetter-Sensoren (Fallback / Kompatibilität)
  # Wird verwendet, wenn kein weather_entity konfiguriert ist.
  weather:
    sensor_temperature: sensor.aussentemperatur      # Pflicht (ohne weather_entity)
    sensor_temperature_high: sensor.tageshoechsttemperatur  # Optional: für Temperaturbereich
    sensor_humidity: sensor.luftfeuchtigkeit         # Optional, default: 50%
    sensor_wind: sensor.windgeschwindigkeit          # Optional, default: 0 m/s
    sensor_rain: sensor.niederschlag                 # Optional, default: 0 mm/h
    sensor_radiation: sensor.sonnenstrahlung         # Optional: für Strahlungstemperatur
  # Hinweis: sensor_humidity, sensor_rain und sensor_radiation werden auch bei
  # weather_entity weiterhin aus diesen Sensoren gelesen (falls konfiguriert).

  # Person-Entity (optional) – liest met_rate, pmv_target, age und gender
  # direkt aus den Attributen der Person-Entity (via homeassistant.customize).
  # Hat Vorrang vor den sensor_*-Einstellungen im person:-Block.
  person_entity: person.alice

  # Person-Konfiguration (optional) – Fallback wenn person_entity nicht gesetzt
  # oder die jeweiligen Attribute dort fehlen
  person:
    sensor_activity: input_select.aktivitaet         # Aktivitätslevel (Met)
    sensor_age: input_number.alter                   # Alter für Met-Anpassung
    sensor_gender: input_select.geschlecht           # Geschlecht für Met-Anpassung
    pmv_target: 0.0                                  # Ziel-PMV (-0.5 = kühler, +0.5 = wärmer)


# ============================================================================
# Person-Attribute via homeassistant.customize
# ============================================================================
# Alternativ zu Sensor-Entities können die Parameter direkt auf der Person-Entity
# gespeichert werden. Diese Werte werden beim HA-Start eingelesen.
#
# homeassistant:
#   customize:
#     person.alice:
#       met_rate: 1.4        # Basis-Met-Wert (überschreibt sensor_activity)
#       pmv_target: -0.3     # Bevorzugter Komfortbereich (überschreibt person.pmv_target)
#       age: 32              # Alter für demografische Anpassung
#       gender: weiblich     # Geschlecht (überschreibt sensor_gender)


# ============================================================================
# Beispiel Helper-Entities für Person-Konfiguration
# ============================================================================

input_select:
  aktivitaet:
    name: Aktivität
    options:
      - Ruhen/Sitzen
      - Stehen/Leichte Arbeit
      - Langsames Gehen
      - Zügiges Gehen
      - Sport/Laufen
    initial: Stehen/Leichte Arbeit
    icon: mdi:run

  geschlecht:
    name: Geschlecht
    options:
      - männlich
      - weiblich
    initial: männlich
    icon: mdi:gender-male-female

input_number:
  alter:
    name: Alter
    min: 1
    max: 120
    step: 1
    initial: 35
    unit_of_measurement: "Jahre"
    icon: mdi:calendar


# ============================================================================
# Met-Werte Referenz für sensor_activity:
# ============================================================================
# Ruhen/Sitzen:     1.0 Met
# Schlafen:         0.8 Met
# Stehen:           1.2 Met
# Langsames Gehen:  2.0 Met
# Zügiges Gehen:    3.0 Met
# Sport/Laufen:     4.0 Met
#
# Alternativ kann der Sensor auch direkt einen numerischen Met-Wert liefern.
