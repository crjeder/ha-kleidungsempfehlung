services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ha-test
    volumes:
      - ./ha-config:/config
      - ../custom_components:/config/custom_components  # live bind mount - no deploy step needed
    ports:
      - "8123:8123"
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped
