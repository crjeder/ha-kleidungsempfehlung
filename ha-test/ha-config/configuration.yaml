homeassistant:
  name: Test Home
  latitude: 48.1351
  longitude: 11.5820
  elevation: 519
  unit_system: metric
  time_zone: Europe/Berlin
  customize:
    person.test_person:
      met_rate: 2.0
      pmv_target: -0.5
      age: 30
      gender: female

person:
  - name: Test Person
    id: test_person

# Enable REST API (needed for sensor validation)
api:

logger:
  default: warning
  logs:
    custom_components.kleidungsempfehlung: debug   # verbose logging for our integration

# Minimal HTTP config
http:

# Stub weather sensors so the integration has something to read
input_number:
  test_temperature:
    name: Test Temperatur
    min: -30
    max: 50
    step: 0.5
    initial: 10.0
    unit_of_measurement: "°C"

  test_humidity:
    name: Test Luftfeuchte
    min: 0
    max: 100
    step: 1
    initial: 60.0
    unit_of_measurement: "%"

  test_wind:
    name: Test Wind
    min: 0
    max: 30
    step: 0.1
    initial: 3.0
    unit_of_measurement: "m/s"

  test_rain:
    name: Test Regen
    min: 0
    max: 50
    step: 0.1
    initial: 0.0
    unit_of_measurement: "mm/h"

  test_alter:
    name: Alter
    min: 1
    max: 120
    step: 1
    initial: 35
    unit_of_measurement: "Jahre"

input_select:
  test_aktivitaet:
    name: Aktivität
    options:
      - Ruhen/Sitzen
      - Stehen/Leichte Arbeit
      - Langsames Gehen
      - Zügiges Gehen
      - Sport/Laufen
    initial: Stehen/Leichte Arbeit

  test_geschlecht:
    name: Geschlecht
    options:
      - männlich
      - weiblich
    initial: männlich

# Stub weather entity with static hourly forecast for testing weather_entity path
template:
  - weather:
      - name: "Test Wetter"
        condition_template: "sunny"
        temperature_template: "{{ states('input_number.test_temperature') | float(10) }}"
        humidity_template: "{{ states('input_number.test_humidity') | float(60) }}"
        wind_speed_template: "{{ (states('input_number.test_wind') | float(0)) * 3.6 }}"
        forecast_hourly_template: >
          [
            {"datetime": "2026-01-01T06:00:00+00:00", "temperature": 5,  "humidity": 80, "wind_speed": 25, "precipitation": 0},
            {"datetime": "2026-01-01T10:00:00+00:00", "temperature": 10, "humidity": 65, "wind_speed": 14, "precipitation": 0},
            {"datetime": "2026-01-01T14:00:00+00:00", "temperature": 12, "humidity": 60, "wind_speed": 7,  "precipitation": 0},
            {"datetime": "2026-01-01T18:00:00+00:00", "temperature": 7,  "humidity": 75, "wind_speed": 18, "precipitation": 0}
          ]

# The integration itself (YAML mode)
kleidungsempfehlung:
  name: "Kleidungsempfehlung Test"

  inventory: !include inventory.yaml

  max_layers: 4
  solver: "heuristic"   # faster for testing
  layering_factor: 0.835

  # Use weather entity (tests the new forecast path)
  weather_entity: weather.test_wetter

  # Individual sensors still used for humidity and rain
  weather:
    sensor_humidity: input_number.test_humidity
    sensor_rain:     input_number.test_rain

  person_entity: person.test_person

  person:
    sensor_activity: input_select.test_aktivitaet
    sensor_age:      input_number.test_alter
    sensor_gender:   input_select.test_geschlecht
    pmv_target: 0.0
